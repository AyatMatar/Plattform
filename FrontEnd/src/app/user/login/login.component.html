
<section id="contact" class="contact">
  <div class="container" data-aos="fade-up">

    <div class="section-title">
      <h2>تسجبل الدخول</h2>
    </div>

    <div class="row">
      <div class="col-lg-12 mt-5 mt-lg-0 d-flex align-items-stretch text-end">
        <form #loginForm="ngForm" (ngSubmit)="onLogin(loginForm)" class="php-email-form">
          <div class="row">
            <div class="form-group col-md-12">
              <label for="userName">اسم المستخدم</label>
              <input type="text" name="userName" class="form-control" id="name" required ngModel>
            </div>
            <div class="form-group col-md-12">
              <label for="password">كلمة المرور</label>
              <input type="password" name="password" class="form-control" id="name" required ngModel>
            </div>
          </div>
       
          <div class="text-center">
          <button type="submit">دخول</button>
      
          </div>
        </form>
      </div>

    </div>

  </div>
</section>
