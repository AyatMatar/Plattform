<div class="row">
  <div class="col-6">
    <h3>{{title}}</h3>
    <p>form single binding</p>
    <form>
      <div class="row">
        <div class="form-roup col-12 m-1">
          <label for="name">Name</label>
          <input class="form-control" #name />
        </div>
        <div class="form-roup col-12 m-1">
          <label for="name">Mark</label>
          <input class="form-control" #mark />
        </div>
        <div class="form-group col-12 m-1">
          <button (click)="getData(name.value , mark.value)" class="btn btn-primary m-1" type="submit">Save</button>
        </div>
      </div>
    </form>

    <p>Form ngmodel Binding</p>
    <form>
      <div class="row">
        <div class="form-roup col-12 m-1">
          <label for="name">Name</label>
          <input class="form-control" #name type="text"
                 [(ngModel)]="parentObjectForm.name" name="name"/>
        </div>
        <div class="form-roup col-12 m-1">
          <label for="name">Mark</label>
          <input class="form-control" #mark [(ngModel)]="parentObjectForm.mark" name="mark"/>
        </div>
        <div class="form-group col-12 m-1">
          <button (click)="getData(name.value , mark.value)" class="btn btn-primary m-1" type="submit">Save</button>
        </div>
      </div>
    </form>
    <div *ngIf="response">
      {{response}}
    </div>
  </div>
  <div class="col-6">
    <app-child [childName]="parentName"
               [childMark]="parentMark"
               [childObject]="parentObject"
               [childObjectForm]="parentObjectForm"
               [childListArray]="parentListArray"
               (updateEvent)="updateTitle($event)"></app-child>
  </div>
</div>
