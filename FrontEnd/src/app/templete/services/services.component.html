  <!-- ======= Services Section ======= -->
<section id="services" class="services section-bg">
  <div class="container" data-aos="fade-up">

    <div class="section-title">
      <h2>الأقسام الرئيسة</h2>

    </div>

    <div class="row">
      <div class="col-4 d-flex align-items-stretch my-2 text-center" data-aos="zoom-in" data-aos-delay="100" *ngFor="let department of departments">
        <div class="icon-box" style="width:100% !important">
          <div class="icon"><i class="{{department.iconClass}}"></i></div>
          <h4><a href="">{{department.name}}</a></h4>
          <p>{{department.description}}</p>
          <div class="icon m-2">
            <i (click)="edit(department)" class="fa fa-edit" title="تعديل" aria-hidden="true" style="font-size:27px !important"></i>
            <i (click)="view(department)" class="fa fa-eye" title="عرض" aria-hidden="true" style="font-size:27px !important"></i>
            <i (click)="delete(department)" class="fa fa-trash" title="حذف" aria-hidden="true" style="font-size: 27px !important"></i>
          </div>

        </div>
        <button class="btn btn-primary btn-block" routerLink="/course/courses/{{department.id}}" style="background-color: #47b2e4; border-color: #47b2e4 ">الدورات</button>
      </div>

      <div class="col-4 d-flex align-items-stretch my-2  text-center" data-aos="zoom-in" data-aos-delay="100" *ngIf="role == 'ADMIN'">
        <div class="icon-box" style="width:100% !important">
          <div class="icon"><i class="bx bx-plus"></i></div>
          <h4><a routerLink="/department-add">أضف قسم جديد</a></h4>

        </div>
      </div>
      <button routerLink="/course/courses"  class="btn btn-block my-1 text-white btn-block-style"><b>جميع الدورات</b></button>
    </div>
  </div>
</section><!-- End Services Section -->
