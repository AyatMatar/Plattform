
<!-- ======= courses Section ======= -->
<section id="services" class="services section-bg">
  <div class="container" data-aos="fade-up">

    <div class="section-title">
      <h2>الدورات</h2>
    </div>

    <div class="row">
      <div class="col-4 d-flex align-items-stretch my-2 text-center" data-aos="zoom-in" data-aos-delay="100" *ngFor="let course of courses">
        <div class="icon-box" style="width:100% !important">
          <div class="icon"><i class="fa fa-book"></i></div>
          <h4><a href="">{{course.name}}</a></h4>
          <p>{{course.description}}</p>
          <div class="icon m-2">
            <i routerLink="/course/course/edit/{{course.id}}" class="fa fa-edit" title="تعديل" aria-hidden="true" style="font-size:27px !important"></i>
            <i routerLink="/course/course/view/{{course.id}}" class="fa fa-eye" title="عرض" aria-hidden="true" style="font-size:27px !important"></i>
            <i (click)="delete(course)" class="fa fa-trash" title="حذف" aria-hidden="true" style="font-size: 27px !important"></i>
          </div>

        </div>
        <button class="btn btn-primary btn-block" routerLink="/section/{{course.id}}" style="background-color: #47b2e4; border-color: #47b2e4 ">الشعب</button>
      </div>

      <div class="col-4 d-flex align-items-stretch my-2  text-center" data-aos="zoom-in" data-aos-delay="100">
        <div class="icon-box" style="width:100% !important">
          <div class="icon"><i class="bx bx-plus"></i></div>
          <h4><a routerLink="/course/course/add">أضف دورة جديدة</a></h4>

        </div>
      </div>
      <button routerLink="/sections" class="btn btn-block my-1 text-white btn-block-style"><b>جميع الشعب</b></button>
      <button routerLink="/services" class="btn btn-block my-1 text-white btn-block-style"><b>العودة للأقسام الرئيسية</b></button>
    </div>

  </div>
</section><!-- End courses Section -->
