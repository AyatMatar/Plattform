
    <!--======= Contact Section =======--> 
<section id="contact" class="contact">
  <div class="container" data-aos="fade-up">

    <div class="section-title">
      <h2>إضافة شعبه جديد</h2>
    </div>

    <div class="row">

      <div class="col-lg-12 mt-5 mt-lg-0 d-flex align-items-stretch text-end">
        <form #sectionForm="ngForm" class="php-email-form">
          <div class="row">
            <div class="form-group col-12">
              <label for="department">المحاضرة</label>
              <select name="team" class="form-control" required id="team" [(ngModel)]="section.teacherId">
                <option *ngFor="let team of teams" [value]="team.id">
                  {{team.firstName}}-{{team.lastName}}
                </option>
              </select>
            </div>
            <div class="form-group col-12">
              <label for="department">الأقسام الرئيسية</label>
              <select name="department" class="form-control" id="department" required [(ngModel)]="departmentId" (ngModelChange)="departmentChange(departmentId)">
                <option *ngFor="let dep of departments" [value]="dep.id">
                  {{dep.name}}
                </option>
              </select>
            </div>
            <div class="form-group col-12" *ngIf="courses.length">
              <label for="course">الدورات</label>
              <select name="course" class="form-control" required id="course" [(ngModel)]="section.courseId">
                <option *ngFor="let course of courses" [value]="course.id">
                  {{course.name}}
                </option>
              </select>
            </div>
            <div class="form-group col-md-12">
              <label for="name">اسم الشعبة</label>
              <input type="text" class="form-control" name="section.name" id="section.name"  required [(ngModel)]="section.name" />
            </div>
            <div class="form-group col-md-6">
              <label for="description">عدد الساعات الكلي</label>
              <input type="number" class="form-control" name="section.totalHoures"  id="section.totalHoures" required [(ngModel)]="section.totalHoures" />
            </div>
            <div class="form-group col-md-6">
              <label for="description">عدد المحاضرات أسبوعيا</label>
              <input type="number" class="form-control" name="section.lecturesPerWeek"  id="section.lecturesPerWeek" required [(ngModel)]="section.lecturesPerWeek" />
            </div>
            <div class="form-group col-md-6">
              <label for="description">موعد المحاضرة: من الساعة</label>
              <input type="number" class="form-control" name="section.timeFrom"  id="section.timeFrom" required [(ngModel)]="section.timeFrom" />
            </div>
            <div class="form-group col-md-6">
              <label for="description">موعد المحاضرة: إلى الساعة</label>
              <input type="number" class="form-control" name="section.timeTo"  id="section.timeTo" required [(ngModel)]="section.timeTo" />
            </div>
          </div>

          <div class="text-center">

            <button class="mx-1" routerLink="/services" type="submit">العودة للأقسام الرئيسية</button>
            <button class="mx-1" (click)="save(sectionForm)" type="submit">حفظ</button>
          </div>

        </form>
      </div>

    </div>

  </div>
</section> <!--End Contact Section-->
