<!-- ======= Team Section ======= -->
<section id="team" class="team section-bg">
  <div class="container" data-aos="fade-up">

    <div class="section-title">
      <h2>فريقنا</h2>
    </div>

    <div class="row">

      <div class="col-lg-6 my-2" data-aos="zoom-in" data-aos-delay="100" *ngFor="let team of teams">
        <div class="member d-flex align-items-start">
          <div class="pic">
            <img src="assets/img/team/{{team.imgName}}" class="img-fluid" alt="" *ngIf="team.imgName">
            <img src="assets/img/team/download.png" class="img-fluid" alt="" *ngIf="!team.imgName">
          </div>
          <div class="member-info">
            <h4>{{getfullName(team)}}</h4>
            <span>{{team.experience}}</span>
            <p>{{team.phoneNumber}}</p>
            <p>{{team.email}}</p>
            <div class="social">
              <a *ngIf="team.twitter" target="_blank" href="{{team.twitter}}"><i class="ri-twitter-fill"></i></a>
              <a *ngIf="team.facebook" target="_blank" href="{{team.facebook}}"><i class="ri-facebook-fill"></i></a>
              <a *ngIf="team.instagram" target="_blank" href="{{team.instagram}}"><i class="ri-instagram-fill"></i></a>
              <a *ngIf="team.linkedin" target="_blank" href="{{team.linkedin}}"> <i class="ri-linkedin-box-fill"></i> </a>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</section><!-- End Team Section -->
