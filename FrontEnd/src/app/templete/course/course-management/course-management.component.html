   <!-- ======= Contact Section ======= -->
<section id="contact" class="contact">
  <div class="container" data-aos="fade-up">

    <div class="section-title">
      <h2>إضافة دورة جديد</h2>
    </div>

    <div class="row">

      <div class="col-lg-12 mt-5 mt-lg-0 d-flex align-items-stretch text-end">
        <form #courseForm="ngForm" class="php-email-form">
          <div class="row">
          <div class="form-group col-12">
            <label for="department">الأقسام الرئيسية</label>
            <select name="course.department" class="form-control" id="course.department" [(ngModel)]="course.departmentId" 
                    [disabled]="pageMode == PageModeEnum.View || pageMode == PageModeEnum.Update">
              <option *ngFor="let dep of departments" [value]="dep.id">
                {{dep.name}}
              </option>
            </select>
          </div>
            <div class="form-group col-md-12 text-end">
              <label for="name">الاسم</label>
              <input type="text" name="name" class="form-control" id="name" [(ngModel)]="course.name" #name="ngModel" [disabled]="pageMode == PageModeEnum.View" required>
              <span class="error-block" *ngIf="!name.valid && name.touched">
                <span *ngIf="name.hasError('required')">
                  يرجى إضافة اسم للقسم
                </span>
              </span>
            </div>
            <div class="form-group col-md-12">
              <label for="description">التفاصيل</label>
              <input type="text" class="form-control" name="description" id="description" #description="ngModel" [disabled]="pageMode == PageModeEnum.View"
                     [(ngModel)]="course.description" required>
              <span class="error-block" *ngIf="!description.valid && description.touched">
                <span *ngIf="description.hasError('required')">
                  يرجى إضافة وصف للقسم
                </span>

              </span>
            </div>

          </div>
 
          <div class="text-center">

            <button class="mx-1" routerLink="/services" type="submit">العودة للأقسام الرئيسية</button>
            <button class="mx-1" (click)="save()" type="submit" *ngIf="pageMode != PageModeEnum.View">حفظ</button>
          </div>

        </form>
      </div>

    </div>

  </div>
</section><!-- End Contact Section -->
