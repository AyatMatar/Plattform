
<!-- ======= Frequently Asked Questions Section ======= -->
<section id="faq" class="faq section-bg">
  <div class="container" data-aos="fade-up">

    <div class="section-title">
      <h2 *ngIf="courseId"> الشعب</h2>
      <h2 *ngIf="!courseId"> جميع الشعب</h2>
      <h4 *ngIf="course">{{course.name}} </h4>
 
    </div>
   
    <div class="faq-list">
      <ul *ngIf="sections">
        <li data-aos="fade-up" [attr.data-aos-delay]="100*(i+1)" *ngFor="let section of sections; let i = index">

          <a data-bs-toggle="collapse" [attr.data-bs-target]="'#faq-list-'+ (i+1)" class="collapsed text-center">
            <span>{{section.name}}</span> <i class="fa fa-book mx-2"></i>
            <i class="bx bx-chevron-down icon-show"></i>
            <i class="bx bx-chevron-up icon-close"></i>
          </a>
          <div [attr.id]="'faq-list-'+(i+1)" class="collapse" data-bs-parent=".faq-list">
            <app-section-management [sectionId]="section.id" *ngIf="section"></app-section-management>
          </div>

        </li>
        <li class="text-center">
          <button routerLink="/services" class="btn btn-block m-2 text-white btn-block-style"><b>العودة للأقسام الرئيسية</b></button>
          <button routerLink="/course/courses" class="btn btn-block m-2 text-white btn-block-style"><b>العودة للدورات</b></button>
          <button routerLink="/section-add" class="btn btn-block m-2 text-white btn-block-style"><b>إضافة شعبة</b></button>
        </li>
      </ul>
    </div>

  </div>
</section><!-- End Frequently Asked Questions Section -->
